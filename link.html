<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Piece Shift Lab | Link</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --gold: #c9a24b;
    --gold-light: #e6c988;
    --gold-dim: rgba(201,162,75,0.35);
    --bg: #0c0a08;
    --cream: #f4ede0;
    --cream-soft: rgba(244,237,224,0.72);
    --panel: rgba(255,255,255,0.045);
    --panel-line: rgba(201,162,75,0.28);
    --eng: 'Cormorant Garamond', serif;
    --sans: 'Zen Kaku Gothic New', sans-serif;
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }
  body{
    margin:0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--cream);
    font-family: var(--sans);
    line-height: 1.9;
    -webkit-font-smoothing: antialiased;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }

  a{ color: inherit; text-decoration: none; }

  /* Hero photo */
  .hero{
    position: relative;
    width: 100%;
    height: 44vh;
    min-height: 300px;
    max-height: 420px;
    overflow: hidden;
  }
  .hero img.bg{
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center 68%;
    display: block;
  }
  .hero::after{
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(12,10,8,0) 38%, rgba(12,10,8,0.7) 62%, var(--bg) 82%);
  }

  /* Logo overlaps the seam between photo and dark section */
  .logo-wrap{
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
    margin-top: 44px;
    z-index: 2;
  }
  .logo-wrap img{
    width: min(64%, 300px);
    height: auto;
    display: block;
    filter: drop-shadow(0 6px 22px rgba(0,0,0,0.6));
  }

  .wrap{
    max-width: 560px;
    margin: 0 auto;
    padding: 0 24px 88px;
  }

  .header{
    text-align: center;
    margin-top: 44px;
    margin-bottom: 52px;
  }
  .header .sub{
    font-family: var(--eng);
    font-size: 13px;
    letter-spacing: 0.28em;
    color: var(--gold-light);
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .header p{
    font-size: 14.5px;
    color: var(--cream-soft);
    max-width: 300px;
    margin: 0 auto;
  }

  .section-label{
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 0 0 22px;
  }
  .section-label span{
    font-family: var(--eng);
    font-size: 13px;
    letter-spacing: 0.34em;
    color: var(--gold-light);
    white-space: nowrap;
  }
  .section-label::before,
  .section-label::after{
    content: "";
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--panel-line), transparent);
  }
  .section-label::before{ max-width: 24px; }

  .cards{
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .card{
    display: block;
    background: var(--panel);
    border: 1px solid var(--panel-line);
    border-radius: 14px;
    padding: 26px 24px;
    transition: border-color 0.25s ease, transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
  }
  .card:hover, .card:focus-visible{
    border-color: var(--gold);
    background: rgba(255,255,255,0.075);
    transform: translateY(-2px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    outline: none;
  }
  .card-top{
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }
  .card-icon{
    font-size: 19px;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(201,162,75,0.14);
    border: 1px solid var(--gold-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .card-top h2{
    font-family: var(--eng);
    font-size: 19px;
    font-weight: 600;
    color: var(--gold-light);
    margin: 0;
    letter-spacing: 0.03em;
  }
  .card p{
    font-size: 13.5px;
    color: var(--cream-soft);
    margin: 0 0 14px;
  }
  .card .cta{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 0.03em;
  }
  .card .cta::after{
    content: "→";
    transition: transform 0.2s ease;
  }
  .card:hover .cta::after{
    transform: translateX(3px);
  }

  .card.line{
    border-color: rgba(201,162,75,0.55);
    background: rgba(201,162,75,0.07);
  }
  .card.line .card-icon{
    background: var(--gold);
    border-color: var(--gold);
  }
  .card.line .gift-tag{
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.1em;
    color: #1a1408;
    background: var(--gold-light);
    padding: 4px 11px;
    border-radius: 20px;
    margin-bottom: 12px;
    font-weight: 700;
  }

  .footer{
    text-align: center;
    margin-top: 60px;
  }
  .footer p{
    font-family: var(--eng);
    font-size: 12px;
    letter-spacing: 0.22em;
    color: var(--gold-light);
    text-transform: uppercase;
    opacity: 0.75;
  }
</style>
</head>
